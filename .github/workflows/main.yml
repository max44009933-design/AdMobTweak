name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力清場版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 安全重組 SDK 標頭檔 (防止路徑崩潰版)
      run: |
        # 1. 初始化目錄
        rm -rf ./Frameworks ./include ./temp_admob ./temp_ump
        mkdir -p ./include/GoogleMobileAds
        mkdir -p ./include/UserMessagingPlatform
        mkdir -p ./Frameworks
        
        # 2. 下載 AdMob SDK
        echo "--- 📥 下載 AdMob SDK ---"
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./temp_admob
        
        # 3. 抓取 UMP SDK
        echo "--- 📥 抓取 UMP SDK ---"
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./temp_ump
        
        # 4. 🌟 安全搬移 GoogleMobileAds 標頭檔
        G_HEADERS=$(find ./temp_admob -name "Headers" -type d | grep "GoogleMobileAds.framework" | head -n 1)
        if [ -n "$G_HEADERS" ]; then
          echo "✅ 找到 AdMob Headers: $G_HEADERS"
          cp -R "$G_HEADERS"/* ./include/GoogleMobileAds/
        else
          echo "❌ 錯誤：找不到 AdMob Headers！"
          ls -R ./temp_admob
          exit 1
        fi
        
        # 5. 🌟 安全搬移 UMP 標頭檔
        U_HEADERS=$(find ./temp_ump -name "Headers" -type d | grep "UserMessagingPlatform.framework" | head -n 1)
        if [ -n "$U_HEADERS" ]; then
          echo "✅ 找到 UMP Headers: $U_HEADERS"
          cp -R "$U_HEADERS"/* ./include/UserMessagingPlatform/
        else
          echo "❌ 錯誤：找不到 UMP Headers！"
          exit 1
        fi
        
        # 6. 搬移二進位 Framework
        find ./temp_admob -path "*/ios-arm64/*.framework" -type d -exec cp -Rf {} ./Frameworks/ \;
        find ./temp_ump -path "*/ios-arm64/*.framework" -type d -exec cp -Rf {} ./Frameworks/ \;
        
        echo "--- ✅ 全部結構準備就緒 ---"

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
