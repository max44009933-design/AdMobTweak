name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 抓取官方 SDK (架構修正版)
      run: |
        rm -rf ./Frameworks ./admob_temp ./ump_temp
        mkdir -p ./Frameworks
        
        # 1. 下載並提取 AdMob (官方二進位版)
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./admob_temp
        G_SRC=$(find ./admob_temp -name "GoogleMobileAds.framework" -type d | head -n 1)
        cp -Rf "$G_SRC" ./Frameworks/
        
        # 2. 抓取 UMP (GitHub 倉庫版)
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./ump_temp
        U_SRC=$(find ./ump_temp -name "UserMessagingPlatform.framework" -type d | grep "ios-arm64" | head -n 1)
        cp -Rf "$U_SRC" ./Frameworks/
        
        echo "--- ✅ 最終結構檢查 (必須看到 GoogleMobileAds.h) ---"
        ls -R ./Frameworks/GoogleMobileAds.framework/Headers/GoogleMobileAds.h

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
