name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 提取 SDK (Python 核心解析版)
      run: |
        mkdir -p ./Frameworks ./include ./temp_admob ./temp_ump
        
        echo "--- 📋 更新 Pod 倉庫索引 ---"
        pod repo update
        
        # 🌟 使用 Python 精準提取 AdMob 連結
        echo "--- 🔍 正在查詢 AdMob 連結 ---"
        G_URL=$(pod spec cat Google-Mobile-Ads-SDK | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('source', {}).get('http', ''))")
        
        # 如果 Python 抓不到，使用官方固定備案連結
        if [ -z "$G_URL" ]; then
          G_URL="https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip"
          echo "⚠️ 自動提取失敗，使用備案連結"
        fi
        echo "AdMob URL: $G_URL"
        curl -L -A "Mozilla/5.0" "$G_URL" -o admob.zip
        unzip -q admob.zip -d ./temp_admob

        # 🌟 使用 Python 精準提取 UMP 連結
        echo "--- 🔍 正在查詢 UMP 連結 ---"
        U_URL=$(pod spec cat GoogleUserMessagingPlatform | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('source', {}).get('http', ''))")
        
        if [ -z "$U_URL" ]; then
          U_URL="https://dl.google.com/googleadmobadssdk/googleusermessagingplatformsdkios.zip"
          echo "⚠️ 自動提取失敗，使用備案連結"
        fi
        echo "UMP URL: $U_URL"
        curl -L -A "Mozilla/5.0" "$U_URL" -o ump.zip
        unzip -q ump.zip -d ./temp_ump

        # 🚚 搬移並重組結構
        echo "--- 🚚 正在重組 Frameworks ---"
        G_FRAMEWORK=$(find ./temp_admob -name "GoogleMobileAds.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        cp -Rf "$G_FRAMEWORK" ./Frameworks/
        mkdir -p ./include/GoogleMobileAds
        cp -R "$G_FRAMEWORK/Headers"/* ./include/GoogleMobileAds/
        
        U_FRAMEWORK=$(find ./temp_ump -name "UserMessagingPlatform.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        cp -Rf "$U_FRAMEWORK" ./Frameworks/
        mkdir -p ./include/UserMessagingPlatform
        cp -R "$U_FRAMEWORK/Headers"/* ./include/UserMessagingPlatform/
        
        echo "--- ✅ 全部結構準備就緒 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
