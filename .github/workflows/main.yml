name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 手動安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🗜️ 強力解壓縮與目錄重構 (核心修正)
      run: |
        # 1. 建立乾淨的目標資料夾
        mkdir -p ./Frameworks
        
        # 2. 解壓所有內容到臨時目錄
        unzip -o Frameworks.zip -d ./temp_sdk
        
        # 3. 🌟 深度搜救：尋找所有隱藏在 ios-arm64 裡面的真正 framework 並抓出來
        find ./temp_sdk -name "*.framework" -type d | grep "ios-arm64" | while read -r line; do
            echo "找到真正的 SDK: $line"
            cp -R "$line" ./Frameworks/
        done
        
        # 4. 如果沒找到 ios-arm64 (備用方案)，就抓取所有最上層的 framework
        if [ ! "$(ls -A ./Frameworks)" ]; then
            find ./temp_sdk -name "*.framework" -type d -maxdepth 4 -exec cp -R {} ./Frameworks/ \;
        fi

        # 5. 診斷最終路徑
        echo "--- ✅ 最終 Frameworks 目錄結構 ---"
        ls -R ./Frameworks
        rm -rf ./temp_sdk

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        # 強制執行編譯
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
