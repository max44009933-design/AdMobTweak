name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK (強力版)
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 抓取 Google 官方 SDK (全自動搜索路徑)
      run: |
        rm -rf ./Frameworks ./google_sdk ./ump_sdk
        mkdir -p ./Frameworks
        
        # 1. 抓取 Google Ads 並自動尋找 framework
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-mobile-ads.git ./google_sdk
        G_FRAMEWORK=$(find ./google_sdk -name "GoogleMobileAds.framework" | grep "ios-arm64" | head -n 1)
        if [ -z "$G_FRAMEWORK" ]; then G_FRAMEWORK=$(find ./google_sdk -name "GoogleMobileAds.framework" | head -n 1); fi
        echo "找到 GoogleMobileAds: $G_FRAMEWORK"
        cp -R "$G_FRAMEWORK" ./Frameworks/

        # 2. 抓取 UMP 並自動尋找 framework
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./ump_sdk
        U_FRAMEWORK=$(find ./ump_sdk -name "UserMessagingPlatform.framework" | grep "ios-arm64" | head -n 1)
        if [ -z "$U_FRAMEWORK" ]; then U_FRAMEWORK=$(find ./ump_sdk -name "UserMessagingPlatform.framework" | head -n 1); fi
        echo "找到 UserMessagingPlatform: $U_FRAMEWORK"
        cp -R "$U_FRAMEWORK" ./Frameworks/
        
        echo "--- ✅ SDK 準備就緒 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
