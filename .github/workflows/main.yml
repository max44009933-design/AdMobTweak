name: Build StartApp Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos 與依賴工具
      run: |
        brew install ldid
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 提取 Start.io SDK
      run: |
        rm -rf ./Frameworks ./include ./temp_sdk
        mkdir -p ./Frameworks ./include
        
        echo "--- 📥 從 GitHub SPM 抓取 StartApp SDK ---"
        git clone --depth 1 https://github.com/StartApp-SDK/StartAppSDK-SwiftPackage.git ./temp_sdk

        echo "--- 🚚 提取 ios-arm64 Framework ---"
        # 尋找實機版 arm64 的 StartApp.framework
        FW_PATH=$(find ./temp_sdk -path "*/ios-arm64/StartApp.framework" -o -path "*/ios-arm64_armv7/StartApp.framework" | head -n 1)
        
        if [ -n "$FW_PATH" ]; then
            cp -Rf "$FW_PATH" ./Frameworks/
            mkdir -p ./include/StartApp
            cp -R "$FW_PATH/Headers"/* ./include/StartApp/ 2>/dev/null || true
            echo "✅ 成功提取 StartApp.framework"
        else
            echo "❌ 找不到 StartApp.framework"
            exit 1
        fi

        echo "--- ✅ 結構檢查 ---"
        ls -F ./include/StartApp/ | head -n 10

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        touch Dummy.swift
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_StartAppNative_Dylib
        path: .theos/obj/arm64/*.dylib
