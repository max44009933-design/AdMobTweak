name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 提取 SDK (暴力歸位版)
      run: |
        mkdir -p ./Frameworks ./include/GoogleMobileAds ./include/UserMessagingPlatform ./temp_sdk
        
        # 1. 下載全能包
        echo "--- 📥 下載 Google SDK ---"
        curl -f -L -A "Mozilla/5.0" "https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip" -o sdk.zip
        unzip -q sdk.zip -d ./temp_sdk

        # 2. 🌟 暴力搜尋並提取所有標頭檔 (不分層級，通通抓出來)
        echo "--- 🚚 提取標頭檔 ---"
        # 尋找所有 GoogleMobileAds 相關的 .h 檔案
        find ./temp_sdk -name "GoogleMobileAds.framework" -type d -exec find {} -name "*.h" \; | xargs -I {} cp {} ./include/GoogleMobileAds/
        # 尋找所有 UMP 相關的 .h 檔案
        find ./temp_sdk -name "UserMessagingPlatform.framework" -type d -exec find {} -name "*.h" \; | xargs -I {} cp {} ./include/UserMessagingPlatform/

        # 3. 🌟 提取實機版 Framework 二進制檔
        echo "--- 🚚 提取二進制 Framework ---"
        find ./temp_sdk -path "*/ios-arm64/*.framework" -type d -exec cp -Rf {} ./Frameworks/ \;

        echo "--- ✅ 結構檢查 (必須看到 GoogleMobileAds.h) ---"
        ls ./include/GoogleMobileAds/GoogleMobileAds.h || exit 1
        ls ./Frameworks/GoogleMobileAds.framework/GoogleMobileAds || exit 1

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
