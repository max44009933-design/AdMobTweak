name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 提取 SDK (完美結構對位版)
      run: |
        mkdir -p ./Frameworks ./include ./temp_sdk
        
        # 1. 下載最新 SDK
        echo "--- 📥 下載 Google Mobile Ads SDK ---"
        curl -f -L -A "Mozilla/5.0" "https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip" -o sdk.zip
        unzip -q sdk.zip -d ./temp_sdk

        # 2. 🌟 提取 GoogleMobileAds (完美保留結構)
        echo "--- 🚚 提取 GoogleMobileAds ---"
        G_PATH=$(find ./temp_sdk -name "GoogleMobileAds.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$G_PATH" ]; then
          cp -Rf "$G_PATH" ./Frameworks/
          mkdir -p ./include/GoogleMobileAds
          # 使用 -R 遞迴複製，完美保留包含 Mediation 在內的所有子目錄結構
          cp -R "$G_PATH/Headers"/* ./include/GoogleMobileAds/
        fi

        # 3. 🌟 提取 UserMessagingPlatform (UMP)
        echo "--- 🚚 提取 UMP ---"
        U_PATH=$(find ./temp_sdk -name "UserMessagingPlatform.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$U_PATH" ]; then
          cp -Rf "$U_PATH" ./Frameworks/
          mkdir -p ./include/UserMessagingPlatform
          cp -R "$U_PATH/Headers"/* ./include/UserMessagingPlatform/
        fi

        # 4. 🌟 提取 GoogleAppMeasurement
        echo "--- 🚚 提取 AppMeasurement ---"
        M_PATH=$(find ./temp_sdk -name "GoogleAppMeasurement.framework" | grep "ios-arm64" | head -n 1)
        if [ -n "$M_PATH" ]; then
          cp -Rf "$M_PATH" ./Frameworks/
        fi

        echo "--- ✅ 結構檢查 ---"
        ls -F ./include/GoogleMobileAds/

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
