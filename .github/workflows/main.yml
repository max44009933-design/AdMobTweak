name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 抓取官方 SDK (強力權限修復版)
      run: |
        # 1. 完全清理舊資料夾，避免 Permission denied
        rm -rf ./Frameworks ./admob_temp ./ump_temp
        mkdir -p ./Frameworks
        
        # 2. 下載 AdMob SDK (使用官網穩定二進位包)
        echo "--- 📥 下載 AdMob SDK ---"
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./admob_temp
        
        # 3. 抓取 UMP SDK (改用 GitHub 克隆，避開失效的 ZIP 連結)
        echo "--- 📥 抓取 UMP SDK ---"
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./ump_temp
        
        # 4. 🌟 強力歸位：使用 -rf 強制覆蓋
        echo "--- 🚚 正在搬移 Frameworks ---"
        find ./admob_temp -name "GoogleMobileAds.framework" -type d -exec cp -Rf {} ./Frameworks/ \;
        find ./ump_temp -name "UserMessagingPlatform.framework" -type d | grep "ios-arm64" | xargs -I {} cp -Rf {} ./Frameworks/
        
        # 5. 驗證
        echo "--- ✅ 最終檢查 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
