name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 手動安裝 Theos (穩定版)
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK (修正版)
      run: |
        # 直接 Clone SDK 倉庫，確保檔案完整不損壞
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks
        # 檢查 SDK 是否確實存在
        ls -d ~/theos/sdks/iPhoneOS14.5.sdk

    - name: 🗜️ 解壓縮 Frameworks 並修正結構
      run: |
        unzip -o Frameworks.zip -d .
        # 🌟 自動排除「資料夾套資料夾」的問題
        if [ -d "Frameworks/Frameworks" ]; then
          mv Frameworks/Frameworks/* ./Frameworks/
        fi
        echo "--- 檢查目前目錄結構 ---"
        ls -R

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        # 確保編譯器能找到 SDK
        make clean
        make
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/debug/arm64/*.dylib
