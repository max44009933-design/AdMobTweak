name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK (強力版)
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 抓取 Google 官方 SDK (混合穩定版)
      run: |
        rm -rf ./Frameworks ./temp_admob ./temp_ump
        mkdir -p ./Frameworks
        
        # 1. 下載 AdMob SDK (使用剛才成功的連結)
        echo "正在下載 AdMob SDK..."
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./temp_admob
        
        # 2. 下載 UMP SDK (改用 GitHub 克隆，避開失效的 ZIP 連結)
        echo "正在下載 UMP SDK..."
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./temp_ump
        
        # 3. 🌟 全方位搜救：尋找所有 .framework 資料夾
        echo "正在歸位 Frameworks..."
        # 搜救 AdMob
        find ./temp_admob -name "GoogleMobileAds.framework" -type d -exec cp -R {} ./Frameworks/ \;
        # 搜救 UMP (從克隆的目錄中找)
        find ./temp_ump -name "UserMessagingPlatform.framework" -type d | grep "ios-arm64" | xargs -I {} cp -R {} ./Frameworks/
        
        # 4. 驗證是否成功
        echo "--- ✅ 最終 Frameworks 內容 ---"
        ls -d ./Frameworks/*.framework || (echo "❌ 依然找不到 SDK！" && exit 1)

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
