name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 手動安裝 Theos
      run: |
        # 確保路徑乾淨
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK (暴力修正版)
      run: |
        # 🌟 關鍵修正：先刪除舊的 sdks 資料夾，避免 Git 報錯
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks
        # 確認 SDK 確實存在
        ls -d ~/theos/sdks/iPhoneOS14.5.sdk

    - name: 🗜️ 解壓縮 Frameworks
      run: |
        unzip -o Frameworks.zip -d .
        # 自動修正資料夾層級
        if [ -d "Frameworks/Frameworks" ]; then
          mv Frameworks/Frameworks/* ./Frameworks/
        fi
        echo "--- 檢查目前目錄結構 ---"
        ls -R ./Frameworks/

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        # 使用全路徑呼叫 make，確保穩定
        make clean
        make
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/debug/arm64/*.dylib
