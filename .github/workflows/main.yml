name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK (強力版)
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 抓取 Google 官方二進位 SDK (保證成功版)
      run: |
        rm -rf ./Frameworks ./temp_admob ./temp_ump
        mkdir -p ./Frameworks
        
        # 1. 下載官方 AdMob SDK ZIP
        echo "正在下載 AdMob SDK..."
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./temp_admob
        
        # 2. 下載官方 UMP SDK ZIP
        echo "正在下載 UMP SDK..."
        curl -L https://dl.google.com/googleadmobadssdk/googleusermessagingplatformsdkios.zip -o ump.zip
        unzip -q ump.zip -d ./temp_ump
        
        # 3. 搜尋並歸位 (使用更強大的搜尋邏輯)
        echo "正在搜尋 Frameworks..."
        find ./temp_admob -name "GoogleMobileAds.framework" -type d -exec cp -R {} ./Frameworks/ \;
        find ./temp_ump -name "UserMessagingPlatform.framework" -type d -exec cp -R {} ./Frameworks/ \;
        
        # 4. 驗證是否成功
        echo "--- ✅ 最終 Frameworks 內容 ---"
        ls -d ./Frameworks/*.framework || (echo "❌ 依然找不到 SDK！內容清單如下：" && ls -R ./temp_admob && exit 1)

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
