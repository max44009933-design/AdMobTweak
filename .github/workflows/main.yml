name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 手動安裝 Theos (穩定防錯版)
      run: |
        # 🌟 直接 Clone 原始碼，不執行 install-theos 腳本，避開 API 錯誤
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        # 直接下載打包好的 SDK 檔案，速度最快且最穩定
        mkdir -p ~/theos/sdks
        curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz
        tar -xf ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/
        rm ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz

    - name: 🗜️ 解壓縮 Frameworks SDK
      run: |
        unzip -o Frameworks.zip -d .
        # 確認解壓後的目錄存在
        ls -R Frameworks/

    - name: 🚀 開始編譯 Dylib
      run: |
        # 強制清理並編譯
        export THEOS=~/theos
        make clean
        make
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/debug/arm64/*.dylib
