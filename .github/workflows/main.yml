name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🗜️ 暴力拆解並強行重組 SDK
      run: |
        # 1. 建立標準空殼
        mkdir -p ./Frameworks/GoogleMobileAds.framework/Headers
        mkdir -p ./Frameworks/UserMessagingPlatform.framework/Headers
        unzip -o Frameworks.zip -d ./temp_sdk
        
        echo "--- 🛠️ 正在強行重組 GoogleMobileAds ---"
        # 尋找內層的二進位檔案並歸位
        find ./temp_sdk -name "GoogleMobileAds" -type f | grep "ios-arm64" | grep ".framework" | head -n 1 | xargs -I {} cp {} ./Frameworks/GoogleMobileAds.framework/
        # 尋找所有標頭檔並歸位到 Headers 資料夾
        find ./temp_sdk -name "*.h" | grep "GoogleMobileAds" | grep "ios-arm64" | xargs -I {} cp {} ./Frameworks/GoogleMobileAds.framework/Headers/

        echo "--- 🛠️ 正在強行重組 UserMessagingPlatform ---"
        find ./temp_sdk -name "UserMessagingPlatform" -type f | grep "ios-arm64" | grep ".framework" | head -n 1 | xargs -I {} cp {} ./Frameworks/UserMessagingPlatform.framework/
        find ./temp_sdk -name "*.h" | grep "UserMessagingPlatform" | grep "ios-arm64" | xargs -I {} cp {} ./Frameworks/UserMessagingPlatform.framework/Headers/

        echo "--- 📋 最終重組結果檢查 ---"
        ls -R ./Frameworks
        rm -rf ./temp_sdk

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        # 最終生死檢查：確認重組後的標頭檔路徑是否正確
        if [ -f "./Frameworks/GoogleMobileAds.framework/Headers/GoogleMobileAds.h" ]; then
            make clean
            make FINALPACKAGE=1
        else
            echo "❌ 嚴重失敗：暴力重組後依然找不到標頭檔！"
            echo "請檢查您的 Frameworks.zip 裡面是否真的包含 GoogleMobileAds.h"
            exit 1
        fi
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
