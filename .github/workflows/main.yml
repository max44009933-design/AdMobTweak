name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 抓取官方 SDK (搜救隊模式)
      run: |
        rm -rf ./Frameworks ./admob_temp ./ump_temp
        mkdir -p ./Frameworks
        
        # 1. 下載並提取 AdMob
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./admob_temp
        
        # 2. 下載並提取 UMP
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./ump_temp
        
        # 🌟 暴力搜尋：不管藏多深，只要是 ios-arm64 且結尾是 .framework 就抓出來
        echo "--- 正在進行檔案搜救 ---"
        find ./admob_temp -path "*/ios-arm64/*.framework" -type d -exec cp -Rf {} ./Frameworks/ \;
        find ./ump_temp -path "*/ios-arm64/*.framework" -type d -exec cp -Rf {} ./Frameworks/ \;
        
        echo "--- ✅ 搜救結果 (必須看到內容) ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
