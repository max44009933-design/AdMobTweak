name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🗜️ 深度搜尋並修正 Frameworks (精準定位)
      run: |
        mkdir -p ./Frameworks
        unzip -o Frameworks.zip -d ./temp_sdk
        
        echo "--- 🔍 開始深度搜尋 SDK 本體 ---"
        
        # 1. 尋找 GoogleMobileAds.h 的位置，並將其所屬的 .framework 搬出來
        G_PATH=$(find ./temp_sdk -name "GoogleMobileAds.h" | grep "ios-arm64" | head -n 1)
        if [ -n "$G_PATH" ]; then
            # 取得 Headers 的上一層，即 .framework 資料夾的路徑
            G_FRAMEWORK_PATH=$(dirname $(dirname "$G_PATH"))
            echo "✅ 找到 GoogleMobileAds: $G_FRAMEWORK_PATH"
            cp -R "$G_FRAMEWORK_PATH" ./Frameworks/GoogleMobileAds.framework
        fi

        # 2. 尋找 UserMessagingPlatform.h 的位置
        U_PATH=$(find ./temp_sdk -name "UserMessagingPlatform.h" | grep "ios-arm64" | head -n 1)
        if [ -n "$U_PATH" ]; then
            U_FRAMEWORK_PATH=$(dirname $(dirname "$U_PATH"))
            echo "✅ 找到 UserMessagingPlatform: $U_FRAMEWORK_PATH"
            cp -R "$U_FRAMEWORK_PATH" ./Frameworks/UserMessagingPlatform.framework
        fi

        echo "--- 📋 最終目錄結構驗證 ---"
        ls -R ./Frameworks | grep ".h" | head -n 20
        rm -rf ./temp_sdk

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        # 再次檢查檔案是否存在，防止空白編譯
        if [ -f "./Frameworks/GoogleMobileAds.framework/Headers/GoogleMobileAds.h" ]; then
            make clean
            make FINALPACKAGE=1
        else
            echo "❌ 嚴重錯誤：即便搜尋後仍找不到標頭檔！請檢查 Frameworks.zip 內容。"
            find . -name "GoogleMobileAds.h"
            exit 1
        fi
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
