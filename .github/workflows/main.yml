name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 直接下載官方二進位 SDK (終極修正版)
      run: |
        mkdir -p ./Frameworks
        
        # 1. 下載並提取 Google Mobile Ads
        echo "--- 📥 下載 AdMob SDK ---"
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./admob_temp
        # 暴力搜尋並移動
        find ./admob_temp -name "GoogleMobileAds.framework" -type d -exec cp -R {} ./Frameworks/ \;

        # 2. 下載並提取 UMP SDK
        echo "--- 📥 下載 UMP SDK ---"
        curl -L https://dl.google.com/googleadmobadssdk/googleusermessagingplatformsdkios.zip -o ump.zip
        unzip -q ump.zip -d ./ump_temp
        # 暴力搜尋並移動
        find ./ump_temp -name "UserMessagingPlatform.framework" -type d -exec cp -R {} ./Frameworks/ \;

        echo "--- ✅ 檢查結果 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
