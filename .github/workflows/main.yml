name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力清場版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 📦 使用 CocoaPods 抓取 SDK (業界標準穩定版)
      run: |
        mkdir -p ./Frameworks ./include
        
        # 1. 建立一個臨時 Podfile 來下載 AdMob 和 UMP
        echo "platform :ios, '14.0'
        target 'Temp' do
          pod 'Google-Mobile-Ads-SDK'
        end" > Podfile
        
        # 2. 執行安裝 (這會自動抓取最新、最完整的 AdMob + UMP)
        pod install --repo-update
        
        echo "--- 🔍 正在從 Pods 提取 Frameworks ---"
        
        # 3. 定位並提取 GoogleMobileAds
        G_PATH=$(find ./Pods/Google-Mobile-Ads-SDK -name "GoogleMobileAds.framework" -type d | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        cp -Rf "$G_PATH" ./Frameworks/
        mkdir -p ./include/GoogleMobileAds
        cp -R "$G_PATH/Headers"/* ./include/GoogleMobileAds/
        
        # 4. 定位並提取 UserMessagingPlatform
        U_PATH=$(find ./Pods/GoogleUserMessagingPlatform -name "UserMessagingPlatform.framework" -type d | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        cp -Rf "$U_PATH" ./Frameworks/
        mkdir -p ./include/UserMessagingPlatform
        cp -R "$U_PATH/Headers"/* ./include/UserMessagingPlatform/
        
        echo "--- ✅ 全部結構準備就緒 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
