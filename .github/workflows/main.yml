name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 暴力重組 SDK 標頭檔 (終極方案)
      run: |
        rm -rf ./Frameworks ./include ./temp_admob ./temp_ump
        mkdir -p ./Frameworks
        mkdir -p ./include/GoogleMobileAds
        mkdir -p ./include/UserMessagingPlatform
        
        # 1. 下載並提取 AdMob
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./temp_admob
        
        # 2. 抓取 UMP
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./temp_ump
        
        # 🌟 暴力提取：把所有 .h 檔案抓出來放在 ./include
        echo "--- 正在提取標頭檔 ---"
        find ./temp_admob -name "*.h" -exec cp {} ./include/GoogleMobileAds/ \;
        find ./temp_ump -name "*.h" -exec cp {} ./include/UserMessagingPlatform/ \;
        
        # 🌟 抓取二進位庫 (用於連結)
        find ./temp_admob -path "*/ios-arm64/*.framework" -type d -exec cp -Rf {} ./Frameworks/ \;
        find ./temp_ump -path "*/ios-arm64/*.framework" -type d -exec cp -Rf {} ./Frameworks/ \;
        
        echo "--- ✅ 檢查提取結果 ---"
        ls ./include/GoogleMobileAds/GoogleMobileAds.h
        ls ./Frameworks/GoogleMobileAds.framework/GoogleMobileAds

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
