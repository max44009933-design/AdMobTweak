name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 手動安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks
        ls -d ~/theos/sdks/iPhoneOS14.5.sdk

    - name: 🗜️ 解壓縮 Frameworks
      run: |
        # 確保清理舊資料夾
        rm -rf Frameworks
        unzip -o Frameworks.zip -d .
        
        # 🌟 自動修正：確保 GoogleMobileAds.framework 就在 ./Frameworks 之下
        # 有些壓縮軟體會多包一層資料夾，這段代碼會自動把它抓出來
        if [ -d "Frameworks/Frameworks" ]; then
          cp -R Frameworks/Frameworks/* ./Frameworks/
        fi
        
        echo "--- 📋 目前目錄結構診斷 ---"
        find ./Frameworks -name "*.framework" -maxdepth 2

    - name: 🚀 開始編譯 Dylib
      run: |
        # 強制指定環境變數
        export THEOS=~/theos
        export PATH="$THEOS/bin:$PATH"
        
        # 打印 Makefile 內容確保沒傳錯
        cat Makefile
        
        # 執行編譯
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
