name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🗜️ 暴力解壓縮與 SDK 重構
      run: |
        # 1. 準備乾淨的目錄
        mkdir -p ./Frameworks
        unzip -o Frameworks.zip -d ./temp_sdk
        
        # 2. 🌟 暴力搜救：不論埋多深，找出所有真正的 framework (排除模擬器版本)
        # 我們尋找包含 Headers 的 framework，並優先挑選路徑中含有 arm64 的版本
        find ./temp_sdk -name "*.framework" -type d | while read -r f; do
            if [ -d "$f/Headers" ] && [[ "$f" == *"ios-arm64"* ]] && [[ "$f" != *"simulator"* ]]; then
                fname=$(basename "$f")
                echo "🚀 發現關鍵 SDK: $f -> 移至 ./Frameworks/$fname"
                cp -R "$f" "./Frameworks/$fname"
            fi
        done
        
        # 3. 如果上面沒抓到，嘗試抓取所有 framework (最後備案)
        if [ ! "$(ls -A ./Frameworks)" ]; then
            find ./temp_sdk -name "*.framework" -type d -maxdepth 5 -exec cp -R {} ./Frameworks/ \;
        fi

        echo "--- 📋 最終確認 ./Frameworks 內容 ---"
        ls -d ./Frameworks/*.framework || echo "❌ 警告：依然沒找到任何 framework！"

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        # 如果 Frameworks 裡面有東西才編譯
        if [ -d "./Frameworks/GoogleMobileAds.framework" ]; then
            make clean
            make FINALPACKAGE=1
        else
            echo "❌ 錯誤：找不到 GoogleMobileAds.framework，請檢查你的 Frameworks.zip！"
            exit 1
        fi
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
