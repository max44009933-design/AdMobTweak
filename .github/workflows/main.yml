name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力清場版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 深度搜索並重組 SDK (UMP 救難版)
      run: |
        # 1. 初始化目錄
        rm -rf ./Frameworks ./include ./temp_admob ./temp_ump
        mkdir -p ./include/GoogleMobileAds
        mkdir -p ./include/UserMessagingPlatform
        mkdir -p ./Frameworks
        
        # 2. 下載 SDK
        echo "--- 📥 下載 SDK 中 ---"
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./temp_admob
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./temp_ump
        
        # 3. 🌟 定位 AdMob (已有成功經驗)
        echo "--- 🔍 正在定位 AdMob ---"
        G_FRAMEWORK=$(find ./temp_admob -name "GoogleMobileAds.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$G_FRAMEWORK" ]; then
          echo "✅ 找到 AdMob: $G_FRAMEWORK"
          cp -Rf "$G_FRAMEWORK" ./Frameworks/
          cp -R "$G_FRAMEWORK/Headers"/* ./include/GoogleMobileAds/
        else
          echo "❌ 錯誤：找不到 AdMob 實機版"
          exit 1
        fi
        
        # 4. 🌟 廣域定位 UMP (修正版)
        echo "--- 🔍 正在定位 UMP ---"
        # 嘗試從所有資料夾中找尋 UserMessagingPlatform.framework 且包含 ios-arm64 但排除 simulator
        U_FRAMEWORK=$(find ./temp_ump -name "UserMessagingPlatform.framework" -type d | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        
        # 如果還是找不到，嘗試更寬鬆的搜尋 (不分 slice)
        if [ -z "$U_FRAMEWORK" ]; then
          U_FRAMEWORK=$(find ./temp_ump -name "UserMessagingPlatform.framework" -type d | head -n 1)
        fi

        if [ -n "$U_FRAMEWORK" ]; then
          echo "✅ 找到 UMP: $U_FRAMEWORK"
          cp -Rf "$U_FRAMEWORK" ./Frameworks/
          cp -R "$U_FRAMEWORK/Headers"/* ./include/UserMessagingPlatform/
        else
          echo "❌ 錯誤：找不到 UMP 實機版。目前 temp_ump 目錄結構如下："
          ls -R ./temp_ump
          exit 1
        fi
        
        echo "--- ✅ 全部結構準備就緒 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
