name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 💉 將 AdMob 注入 SDK (核心修正版)
      run: |
        rm -rf ./admob_temp ./ump_temp
        mkdir -p ./Frameworks
        
        # 1. 下載 AdMob
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./admob_temp
        
        # 2. 抓取 UMP
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./ump_temp
        
        # 3. 🌟 關鍵：將它們搬進 SDK 的系統框架目錄
        SDK_PATH=~/theos/sdks/iPhoneOS14.5.sdk/System/Library/Frameworks
        
        find ./admob_temp -name "GoogleMobileAds.framework" -type d -exec cp -Rf {} "$SDK_PATH/" \;
        find ./ump_temp -name "UserMessagingPlatform.framework" -type d | grep "ios-arm64" | xargs -I {} cp -Rf {} "$SDK_PATH/"
        
        echo "--- ✅ SDK 注入完成 ---"
        ls -d "$SDK_PATH/GoogleMobileAds.framework"

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
