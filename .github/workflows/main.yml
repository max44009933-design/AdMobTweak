name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力清場版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 深度搜索並重組 SDK (排除模擬器版)
      run: |
        # 1. 初始化目錄
        rm -rf ./Frameworks ./include ./temp_admob ./temp_ump
        mkdir -p ./include/GoogleMobileAds
        mkdir -p ./include/UserMessagingPlatform
        mkdir -p ./Frameworks
        
        # 2. 下載 SDK
        echo "--- 📥 下載 SDK 中 ---"
        curl -L https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./temp_admob
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./temp_ump
        
        # 3. 🌟 精準定位 AdMob (排除 simulator，鎖定 ios-arm64)
        echo "--- 🔍 正在精準定位 AdMob ---"
        G_HEADERS=$(find ./temp_admob -name "Headers" -type d | grep "GoogleMobileAds.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$G_HEADERS" ]; then
          echo "✅ 找到實機版 AdMob Headers: $G_HEADERS"
          cp -R "$G_HEADERS"/* ./include/GoogleMobileAds/
          G_BIN=$(dirname "$G_HEADERS")/GoogleMobileAds
          cp "$G_BIN" ./Frameworks/GoogleMobileAds.framework/GoogleMobileAds || \
          find ./temp_admob -name "GoogleMobileAds" -type f | grep "ios-arm64" | grep -v "simulator" | xargs -I {} cp {} ./Frameworks/GoogleMobileAds.framework/
        else
          echo "❌ 錯誤：找不到 AdMob 實機版標頭檔！"
          exit 1
        fi
        
        # 4. 🌟 廣域搜索 UMP (解決 UMP 找不到的問題)
        echo "--- 🔍 正在廣域搜索 UMP ---"
        U_HEADERS=$(find ./temp_ump -name "Headers" -type d | grep "UserMessagingPlatform.framework" | grep "ios-arm64" | head -n 1)
        # 如果還是找不到，嘗試找任何包含 UMP 標頭檔的目錄
        if [ -z "$U_HEADERS" ]; then
           U_HEADERS=$(find ./temp_ump -name "UserMessagingPlatform.h" | head -n 1 | xargs dirname)
        fi
        
        if [ -n "$U_HEADERS" ]; then
          echo "✅ 找到 UMP 標頭檔路徑: $U_HEADERS"
          cp -R "$U_HEADERS"/* ./include/UserMessagingPlatform/
          # 搬移二進位檔
          mkdir -p ./Frameworks/UserMessagingPlatform.framework
          find ./temp_ump -name "UserMessagingPlatform" -type f | grep "ios-arm64" | head -n 1 | xargs -I {} cp {} ./Frameworks/UserMessagingPlatform.framework/
        else
          echo "❌ 錯誤：找不到 UMP SDK 檔案！"
          ls -R ./temp_ump # 失敗時印出結構供診斷
          exit 1
        fi
        
        echo "--- ✅ 全部結構準備就緒 ---"

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
