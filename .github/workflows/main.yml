name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        export THEOS=~/theos
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        mkdir -p $THEOS/sdks
        curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o $THEOS/sdks/iPhoneOS14.5.sdk.tar.xz
        tar -xf $THEOS/sdks/iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
        rm $THEOS/sdks/iPhoneOS14.5.sdk.tar.xz

    - name: 🗜️ 解壓縮並修正路徑
      run: |
        unzip -o Frameworks.zip -d .
        # 🌟 自動修正：如果你解壓出來多了一層資料夾，這行會把它移到根目錄
        if [ -d "Frameworks/Frameworks" ]; then
          mv Frameworks/Frameworks/* ./Frameworks/
        fi
        echo "--- 檢查路徑 (這步很重要) ---"
        ls -R Frameworks/

    - name: 🚀 開始編譯 Dylib
      run: |
        make clean
        make
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/debug/arm64/*.dylib
