name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力清場版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 📦 使用 CocoaPods 抓取 SDK (語法修正版)
      run: |
        mkdir -p ./Frameworks ./include
        
        # 1. 🌟 建立一個更「真」的偽裝 Xcode 工程檔
        mkdir -p Dummy.xcodeproj
        touch Dummy.xcodeproj/project.pbxproj
        
        # 2. 建立 Podfile
        echo "platform :ios, '14.0'
        target 'Dummy' do
          use_frameworks!
          pod 'Google-Mobile-Ads-SDK'
        end" > Podfile
        
        # 3. 執行安裝 (拔掉 --no-integrate，加入 --repo-update 確保連結最新)
        pod install --repo-update
        
        echo "--- 🔍 正在從 Pods 提取 Frameworks ---"
        
        # 4. 定位並提取 GoogleMobileAds (廣域搜尋 arm64 實機版)
        G_PATH=$(find ./Pods -name "GoogleMobileAds.framework" -type d | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$G_PATH" ]; then
            echo "✅ 找到 AdMob: $G_PATH"
            cp -Rf "$G_PATH" ./Frameworks/
            mkdir -p ./include/GoogleMobileAds
            cp -R "$G_PATH/Headers"/* ./include/GoogleMobileAds/
        else
            echo "❌ 錯誤：找不到 AdMob Framework！"
            find ./Pods -name "*.framework"
            exit 1
        fi
        
        # 5. 定位並提取 UserMessagingPlatform
        U_PATH=$(find ./Pods -name "UserMessagingPlatform.framework" -type d | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$U_PATH" ]; then
            echo "✅ 找到 UMP: $U_PATH"
            cp -Rf "$U_PATH" ./Frameworks/
            mkdir -p ./include/UserMessagingPlatform
            cp -R "$U_PATH/Headers"/* ./include/UserMessagingPlatform/
        else
            echo "❌ 錯誤：找不到 UMP Framework！"
            exit 1
        fi
        
        echo "--- ✅ 全部結構準備就緒 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
