name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 直接從 Podspec 提取下載連結並下載 (正則加強版)
      run: |
        mkdir -p ./Frameworks ./include ./temp_admob ./temp_ump
        
        echo "--- 📋 更新 Pod 倉庫索引 ---"
        pod repo update
        
        # 1. 🌟 使用正則表達式精準抓取 AdMob ZIP 連結
        echo "--- 🔍 正在查詢 AdMob 下載連結 ---"
        # 尋找包含 http 且以 .zip 結尾的字串
        G_URL=$(pod spec cat Google-Mobile-Ads-SDK | grep -o 'https://[^"]*\.zip' | head -n 1)
        echo "AdMob URL: $G_URL"
        
        if [ -z "$G_URL" ]; then
          echo "❌ 錯誤：無法從 Podspec 提取 AdMob 連結！"
          exit 1
        fi
        curl -L "$G_URL" -o admob.zip
        unzip -q admob.zip -d ./temp_admob
        
        # 2. 🌟 使用正則表達式精準抓取 UMP ZIP 連結
        echo "--- 🔍 正在查詢 UMP 下載連結 ---"
        U_URL=$(pod spec cat GoogleUserMessagingPlatform | grep -o 'https://[^"]*\.zip' | head -n 1)
        echo "UMP URL: $U_URL"
        
        if [ -z "$U_URL" ]; then
          echo "❌ 錯誤：無法從 Podspec 提取 UMP 連結！"
          exit 1
        fi
        curl -L "$U_URL" -o ump.zip
        unzip -q ump.zip -d ./temp_ump
        
        # 3. 🚚 搬移並重組結構
        echo "--- 🚚 正在重組 Frameworks ---"
        # 定位並提取 AdMob (排除 simulator)
        G_FRAMEWORK=$(find ./temp_admob -name "GoogleMobileAds.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        cp -Rf "$G_FRAMEWORK" ./Frameworks/
        mkdir -p ./include/GoogleMobileAds
        cp -R "$G_FRAMEWORK/Headers"/* ./include/GoogleMobileAds/
        
        # 定位並提取 UMP
        U_FRAMEWORK=$(find ./temp_ump -name "UserMessagingPlatform.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        cp -Rf "$U_FRAMEWORK" ./Frameworks/
        mkdir -p ./include/UserMessagingPlatform
        cp -R "$U_FRAMEWORK/Headers"/* ./include/UserMessagingPlatform/
        
        echo "--- ✅ 全部結構準備就緒 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
