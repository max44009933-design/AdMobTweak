name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 強力提取 SDK (全方位整合版)
      run: |
        # 1. 初始化目錄
        rm -rf ./Frameworks ./include ./temp_sdk
        mkdir -p ./Frameworks ./include
        
        # 2. 下載最新 Google Mobile Ads SDK 全能包 (內含 UMP)
        echo "--- 📥 下載 Google Mobile Ads SDK (v13.x+) ---"
        curl -f -L -A "Mozilla/5.0" "https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip" -o sdk.zip
        
        # 安全檢查：確保檔案不是空的路徑
        if [ $(wc -c < "sdk.zip") -lt 1000000 ]; then echo "❌ 下載檔案過小，連結可能失效"; exit 1; fi
        unzip -q sdk.zip -d ./temp_sdk

        # 3. 🌟 自動搜尋並提取所有 Framework (AdMob, UMP, AppMeasurement)
        echo "--- 🚚 正在提取實機版 (arm64) Frameworks ---"
        
        # 定位所有在 ios-arm64 路徑下的 .framework
        find ./temp_sdk -path "*/ios-arm64/*.framework" -type d | while read -r f; do
            name=$(basename "$f")
            echo "✅ 發現框架: $name"
            # 複製到 Frameworks 資料夾
            cp -Rf "$f" ./Frameworks/
            # 同時建立 include 以便編譯器讀取標頭檔
            mkdir -p "./include/${name%.framework}"
            cp -R "$f/Headers"/* "./include/${name%.framework}/" 2>/dev/null || true
        done

        echo "--- ✅ 全部結構準備就緒 ---"
        ls -d ./Frameworks/*.framework

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
