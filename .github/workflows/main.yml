name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 乾淨提取 SDK (SPM 倉庫純淨版)
      run: |
        mkdir -p ./Frameworks ./include
        
        # 1. 抓取 AdMob SPM 倉庫 (確保是最新版)
        echo "--- 📥 抓取 Google Mobile Ads SPM ---"
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-mobile-ads.git ./admob_spm
        
        # 2. 抓取 UMP SPM 倉庫
        echo "--- 📥 抓取 UMP SPM ---"
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./ump_spm

        # 3. 🌟 精準提取 Frameworks 和 Headers
        echo "--- 🚚 重組結構 ---"
        
        # 處理 AdMob
        G_FW=$(find ./admob_spm -name "GoogleMobileAds.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$G_FW" ]; then
          cp -Rf "$G_FW" ./Frameworks/
          mkdir -p ./include/GoogleMobileAds
          # 強制複製 Headers，保留子目錄結構
          cp -R "$G_FW/Headers"/* ./include/GoogleMobileAds/
        fi

        # 處理 UMP
        U_FW=$(find ./ump_spm -name "UserMessagingPlatform.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$U_FW" ]; then
          cp -Rf "$U_FW" ./Frameworks/
          mkdir -p ./include/UserMessagingPlatform
          cp -R "$U_FW/Headers"/* ./include/UserMessagingPlatform/
        fi
        
        # 處理 AppMeasurement (可能包在 AdMob 裡)
        M_FW=$(find ./admob_spm -name "GoogleAppMeasurement.framework" | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$M_FW" ]; then
          cp -Rf "$M_FW" ./Frameworks/
        fi

        echo "--- ✅ 結構檢查 ---"
        ls -F ./include/GoogleMobileAds/ | head -n 10

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
