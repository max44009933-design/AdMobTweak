name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 自動提取 Google SDK (搜尋模式)
      run: |
        mkdir -p ./Frameworks
        
        # 1. 處理 Google Mobile Ads
        echo "--- 📥 正在抓取 Google Mobile Ads ---"
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-mobile-ads.git ./google_sdk
        # 自動尋找包含 ios-arm64 的 .framework 資料夾
        G_PATH=$(find ./google_sdk -name "GoogleMobileAds.framework" | grep "ios-arm64" | head -n 1)
        echo "找到路徑: $G_PATH"
        cp -R "$G_PATH" ./Frameworks/

        # 2. 處理 User Messaging Platform (UMP)
        echo "--- 📥 正在抓取 UMP SDK ---"
        git clone --depth 1 https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git ./ump_sdk
        U_PATH=$(find ./ump_sdk -name "UserMessagingPlatform.framework" | grep "ios-arm64" | head -n 1)
        echo "找到路徑: $U_PATH"
        cp -R "$U_PATH" ./Frameworks/

        echo "--- ✅ 提取完成，目前的 Frameworks 內容： ---"
        ls -R ./Frameworks

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        # 同時在編譯時強制加入搜尋路徑
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
