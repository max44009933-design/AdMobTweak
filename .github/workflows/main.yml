name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos (強力清場版)
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS 14.5 SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 🌐 深度搜索並重組 SDK (官方二進制穩定版)
      run: |
        # 1. 初始化目錄
        rm -rf ./Frameworks ./include ./temp_admob ./temp_ump
        mkdir -p ./include/GoogleMobileAds
        mkdir -p ./include/UserMessagingPlatform
        mkdir -p ./Frameworks
        
        # 2. 下載 AdMob SDK
        echo "--- 📥 下載 AdMob SDK ---"
        curl -L -A "Mozilla/5.0" https://dl.google.com/googleadmobadssdk/googlemobileadssdkios.zip -o admob.zip
        unzip -q admob.zip -d ./temp_admob
        
        # 3. 下載 UMP SDK (直接下載二進制 ZIP，不再克隆 GitHub)
        echo "--- 📥 下載 UMP SDK ---"
        curl -L -A "Mozilla/5.0" https://dl.google.com/googleadmobadssdk/googleusermessagingplatformsdkios.zip -o ump.zip
        unzip -q ump.zip -d ./temp_ump
        
        # 4. 🌟 精準定位 AdMob
        echo "--- 🔍 正在定位 AdMob ---"
        G_FRAMEWORK=$(find ./temp_admob -name "GoogleMobileAds.framework" -type d | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        if [ -n "$G_FRAMEWORK" ]; then
          echo "✅ 找到 AdMob: $G_FRAMEWORK"
          cp -Rf "$G_FRAMEWORK" ./Frameworks/
          cp -R "$G_FRAMEWORK/Headers"/* ./include/GoogleMobileAds/
        else
          echo "❌ 錯誤：找不到 AdMob 實機版"
          exit 1
        fi
        
        # 5. 🌟 精準定位 UMP
        echo "--- 🔍 正在定位 UMP ---"
        U_FRAMEWORK=$(find ./temp_ump -name "UserMessagingPlatform.framework" -type d | grep "ios-arm64" | grep -v "simulator" | head -n 1)
        # 如果 ZIP 結構不同，嘗試抓取任何存在的 framework
        if [ -z "$U_FRAMEWORK" ]; then
          U_FRAMEWORK=$(find ./temp_ump -name "UserMessagingPlatform.framework" -type d | head -n 1)
        fi

        if [ -n "$U_FRAMEWORK" ]; then
          echo "✅ 找到 UMP: $U_FRAMEWORK"
          cp -Rf "$U_FRAMEWORK" ./Frameworks/
          cp -R "$U_FRAMEWORK/Headers"/* ./include/UserMessagingPlatform/
        else
          echo "❌ 錯誤：官方 ZIP 內仍找不到 UMP 框架！"
          ls -R ./temp_ump
          exit 1
        fi
        
        echo "--- ✅ 全部結構準備就緒 ---"

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
