name: Build AdMob Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 下載專案代碼
      uses: actions/checkout@v4

    - name: ⚙️ 安裝 Theos
      run: |
        rm -rf ~/theos
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: 📦 安裝 iOS SDK
      run: |
        rm -rf ~/theos/sdks
        git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks

    - name: 💉 將 AdMob 注入 SDK 核心 (黑科技)
      run: |
        unzip -o Frameworks.zip -d ./temp_sdk
        # 定義 SDK 的框架路徑
        SDK_FRAMEWORKS=~/theos/sdks/iPhoneOS14.5.sdk/System/Library/Frameworks
        
        echo "--- 正在進行 SDK 注入 ---"
        
        # 尋找 GoogleMobileAds 並搬移到 SDK
        G_PATH=$(find ./temp_sdk -name "GoogleMobileAds.h" | grep "ios-arm64" | head -n 1)
        G_DIR=$(dirname $(dirname "$G_PATH"))
        cp -R "$G_DIR" "$SDK_FRAMEWORKS/GoogleMobileAds.framework"
        
        # 尋找 UserMessagingPlatform 並搬移到 SDK
        U_PATH=$(find ./temp_sdk -name "UserMessagingPlatform.h" | grep "ios-arm64" | head -n 1)
        U_DIR=$(dirname $(dirname "$U_PATH"))
        cp -R "$U_DIR" "$SDK_FRAMEWORKS/UserMessagingPlatform.framework"
        
        echo "✅ 注入完成！"
        ls -d "$SDK_FRAMEWORKS/GoogleMobileAds.framework"

    - name: 🚀 開始編譯 Dylib
      run: |
        export THEOS=~/theos
        make clean
        make FINALPACKAGE=1
      env:
        THEOS: ~/theos

    - name: 📤 匯出 Dylib 檔案
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: IPA918_AdMobNative_Dylib
        path: .theos/obj/arm64/*.dylib
